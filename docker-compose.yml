version: '3.7'

services:

  db:
    image: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data/
      - ./data/postgres/database_scripts/001_create_database_prod.sql:/docker-entrypoint-initdb.d/001_create_database_prod.sql
    env_file: .env.prod.db

  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    working_dir: /home/spoolio_backend/app
    # * --capture-output --enable-stdio-inheritance is needed because of Django logging
    # todo add gunicorn logging files (permission denied) --access-logfile /var/log/access_file_g.log --error-logfile /var/log/error_file_g.log
    command: bash -c "gunicorn -b 0.0.0.0:8000 spoolio_backend.wsgi --capture-output --enable-stdio-inheritance"
    volumes:
      - .:/home/spoolio_backend/app
      - /tmp/.X11-unix:/tmp/.X11-unix
      - static_volume:/var/www/spoolio.net/static
      - media_volume:/var/www/spoolio.net/media
    expose:
      - 8000
    depends_on:
      - db
    links:
      - db
    env_file: .env.prod
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.datecron.schedule: "@every 6h"
      ofelia.job-exec.datecron.command: "python3 spoolio_backend/manage.py dbbackup"
      ofelia.job-exec.datecron.container: 'web'
      ofelia.job-exec.datecron.user: 'toqo' # without it there is not access to installed user packages (Django eg)

  ofelia:
    image: mcuadros/ofelia:latest
    depends_on:
      - web
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  nginx:
    image: nginx:latest
    volumes:
      - static_volume:/var/www/spoolio.net/static
      - media_volume:/var/www/spoolio.net/media
      # - ./data/certbot/conf:/etc/letsencrypt/:ro
      # - ./data/certbot/www:/var/www/certbot/:ro
      - ./data/nginx/nginxconfig.io/:/etc/nginx/nginxconfig.io
      - ./data/nginx/sites-available/:/etc/nginx/sites-available
      - ./data/nginx/sites-enabled/:/etc/nginx/sites-enabled
      # Volumes type bind used for single file copying
      - type: bind
        source: ./data/nginx/dhparam.pem
        target: /etc/nginx/dhparam.pem
      - type: bind
        source: ./data/nginx/nginx.conf
        target: /etc/nginx/nginx.conf
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres_data:
  redisdata:
  static_volume:
  media_volume:
