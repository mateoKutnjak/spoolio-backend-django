# * This file is copied from default docker container file /etc/nginx/nginx.conf
# *
# * Only changes are these
# *
# * client_max_body_size under http
# * client_body_buffer_size under http

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    error_log  /var/log/nginx/error.log  debug;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    #gzip  on;

    client_body_buffer_size 20M;  # * directive added by developer
    client_max_body_size    160M; # * directive added by developer

    include /etc/nginx/conf.d/*.conf;
}