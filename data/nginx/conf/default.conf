upstream django {

    # * Service named in docker-compose.yml
    server web:8000;
}

server {
    listen 80;
    listen [::]:80;

    server_name api.spoolio.net;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://api.spoolio.net$request_uri;
    }
}

server {
    listen 443 default_server ssl http2;
    listen [::]:443 ssl http2;

    server_name api.spoolio.net;

    ssl_certificate /etc/nginx/ssl/live/api.spoolio.net/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/api.spoolio.net/privkey.pem;

    location / {

        # * Name defined in first line of this file
        proxy_pass http://django;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_redirect     off;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host $server_name;
    }

    # * Directive 'location /ws' decouples http from ws request 
    # * but http and ws work under same 'location /' directive
    # * for current needs. 
    
    # * If decoupling of request handling is 
    # * needed, uncomment 'location /ws' directive and adjust
}