upstream django {

    # * Service named in docker-compose.yml
    server web:8000;
}

server {
    listen 80;
    listen [::]:80;

    server_name spoolium.com www.spoolium.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://spoolium.com$request_uri;
    }
}

server {
    listen 443 default_server ssl http2;
    listen [::]:443 ssl http2;

    server_name spoolium.com;

    ssl_certificate /etc/nginx/ssl/live/spoolium.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/spoolium.com/privkey.pem;

    location / {

        # * Name defined in first line of this file
        proxy_pass http://django;
    }
}